<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>THC - My INFO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0b0f0d;
      --bg-gradient: linear-gradient(135deg, #0b0f0d, #121a16);
      --panel: #18211d;
      --panel-hover: #1e2a24;
      --text: #e8efe7;
      --muted: #9eaaa1;
      --green: #7fb069;
      --gold: #d6a84f;
      --orange: #d97706;
      --blue: #3b82f6;
      --red: #d14b4b;
      --sidebar-w: 220px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text);
      font-family: 'Outfit', 'Inter', 'Segoe UI', Arial, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    aside {
      width: var(--sidebar-w);
      background: #090e0c;
      border-right: 1px solid #1f2a24;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      font-size: 32px;
      color: var(--green);
      margin-bottom: 8px;
    }

    .logo-title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--text);
      text-transform: uppercase;
    }

    .logo-subtitle {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      list-style: none;
      flex-grow: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .nav-item:hover,
    .nav-item.active {
      color: var(--text);
      background: var(--panel);
    }

    .nav-item.active {
      border-left: 3px solid var(--green);
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    .sidebar-footer {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid #1f2a24;
      padding-top: 16px;
      font-size: 11px;
      color: var(--muted);
    }

    /* Main Area */
    .app-container {
      margin-left: var(--sidebar-w);
      flex-grow: 1;
      padding: 24px;
      max-width: 1600px;
    }

    /* Profile Header */
    .profile-header {
      background: linear-gradient(90deg, #131b17, #0a110e);
      border: 1px solid #233129;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--green);
      object-fit: cover;
      background: #202c25;
    }

    .user-meta h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .online-indicator {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }

    .online-text {
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
    }

    .member-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .achievement-badge {
      display: flex;
      align-items: center;
    }

    .achievement-badge img {
      width: 65px;
      height: 77px;
      object-fit: contain;
    }

    .achievement-badge-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #e0c97f;
    }

    .header-kpis {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .header-kpi-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-kpi-title {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.8px;
    }

    .header-kpi-val {
      font-size: 18px;
      font-weight: 800;
    }

    .header-kpi-sub {
      font-size: 10px;
      color: var(--green);
    }

    .header-kpi-sub.sub-gold {
      color: var(--gold);
    }

    .header-kpi-sub.sub-blue {
      color: var(--blue);
    }

    /* Cards and Grids */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 16px;
      align-items: start;
    }

    .triple-chart-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      background: #121a16;
      border: 1px solid #1f2c24;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .card-content {
      width: 100%;
      height: auto;
    }

    /* Charts layout height */
    .chart-container {
      position: relative;
      height: 200px;
      width: 100%;
    }

    .icon-strip {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      min-height: 38px;
      overflow: hidden;
    }

    .icon-strip-item {
      width: 34px;
      height: 34px;
      object-fit: contain;
      border: 1px solid #26382f;
      border-radius: 4px;
      background: #0b1210;
      padding: 3px;
    }

    /* Right column Last Expedition & Personal Records */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .last-expedition-card {
      background: linear-gradient(180deg, #16221c, #0e1612);
      padding: 10px 16px 9px;
    }

    .last-expedition-card .card-title {
      margin-bottom: 6px;
    }

    .last-expedition-card h4 {
      margin-bottom: 5px !important;
    }

    .expedition-reserve-logo {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 0 0 2px 56px;
      margin-top: -8px;
      margin-bottom: 0;
    }

    .expedition-reserve-logo img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(100, 255, 150, 0.25));
    }

    .expedition-reserve-logo-name {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      text-shadow: 0 0 10px rgba(100, 255, 150, 0.3);
    }

    .exp-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 3px;
    }

    .exp-title {
      color: var(--muted);
    }

    .exp-val {
      font-weight: 700;
    }

    .exp-stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      background: #1d2b23;
      border-radius: 8px;
      padding: 5px 7px;
      text-align: center;
      margin: 6px 0;
    }

    .exp-stat-box h4 {
      font-size: 7.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .exp-stat-box p {
      font-size: 11px;
      font-weight: 800;
    }

    .exp-stat-box h4 {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .exp-stat-box p {
      font-size: 12px;
      font-weight: 800;
    }

    .exp-stat-box.red p {
      color: var(--red);
    }

    .exp-stat-box.green p {
      color: var(--green);
    }

    .exp-stat-box.gold p {
      color: var(--gold);
    }

    .exp-stat-box.blue p {
      color: var(--blue);
    }

    .species-list {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .species-item {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: #25352c;
      border: 1px solid #334a3e;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .species-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 5px;
    }

    .species-count {
      position: absolute;
      bottom: 2px;
      right: 2px;
      background: rgba(0, 0, 0, 0.7);
      color: var(--text);
      font-size: 9px;
      font-weight: bold;
      padding: 1px 3px;
      border-radius: 2px;
    }

    .records-card {
      padding: 14px 16px;
    }

    .records-card .species-list {
      margin-bottom: 10px;
    }

    .records-card .card-title {
      margin-bottom: 7px !important;
    }

    .records-card .records-list {
      margin-bottom: 10px !important;
    }

    .records-card .record-row {
      padding: 5px 0;
    }

    /* Row 2 Grid (Donut, Top Weapons, Ethical Weapons, Top Reserves) */
    .row2-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .ethical-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 12px;
    }

    .ethical-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ethical-badge {
      background: #1f3428;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 11px;
    }

    .ethical-badge.warn {
      background: #3c2a1a;
      border-color: var(--orange);
      color: var(--orange);
    }

    /* Row 3 Grid (Table, Map, Detailed Line) */
    .row3-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr 1.1fr;
      gap: 16px;
      margin-bottom: 12px;
      margin-top: -2px;
    }

    .recent-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
    }

    .recent-table th,
    .recent-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #1f2c24;
      text-align: left;
    }

    .recent-table th {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .recent-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .recent-table-link {
      display: block;
      text-align: center;
      font-size: 11px;
      color: var(--gold);
      text-decoration: none;
      margin-top: 12px;
      font-weight: 600;
    }

    .recent-table-link:hover {
      text-decoration: underline;
    }

    .modal-table-wrap {
      overflow: auto;
      border: 1px solid #26362d;
      border-radius: 8px;
      background: #0b0f0d;
    }

    .modal-table-wrap .recent-table th,
    .modal-table-wrap .recent-table td {
      white-space: nowrap;
    }

    /* Map Container */
    .map-container {
      position: relative;
      height: 200px;
      width: 100%;
      background: #0f1512 url('https://static.wikia.nocookie.net/thehuntergame/images/b/b6/EHR_map.png/revision/latest?cb=20220724221306') no-repeat center;
      background-size: 100% 100%;
      border-radius: 8px;
      overflow: hidden;
    }

    .map-spot {
      position: absolute;
      border-radius: 50%;
      background: rgba(217, 119, 6, 0.4);
      border: 1px solid var(--orange);
      animation: pulse 2s infinite;
      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(0.95);
        box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.7);
      }

      70% {
        transform: translate(-50%, -50%) scale(1);
        box-shadow: 0 0 0 10px rgba(217, 119, 6, 0);
      }

      100% {
        transform: translate(-50%, -50%) scale(0.95);
        box-shadow: 0 0 0 0 rgba(217, 119, 6, 0);
      }
    }

    /* Récords Personales list */
    .records-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .record-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      align-items: center;
    }

    .record-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .record-weapon-icon {
      width: 28px;
      height: 28px;
      object-fit: contain;
      border-radius: 4px;
      background: #0b1210;
      border: 1px solid #26382f;
      padding: 2px;
    }

    .record-star {
      color: var(--gold);
    }

    .record-val {
      font-weight: 700;
      color: var(--text);
    }

    .record-sub {
      font-size: 10px;
      color: var(--muted);
      margin-left: 6px;
    }

    /* Footer Metrics Grid */
    .footer-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
    }

    .footer-card {
      background: #0f1512;
      border: 1px solid #1a251f;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .footer-card-title {
      font-size: 9px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .footer-card-val {
      font-size: 16px;
      font-weight: 800;
    }

    .footer-card-sub {
      font-size: 9px;
      color: var(--green);
      margin-top: 2px;
    }

    /* Modal / Tab for API Explorer */
    .modal-backdrop {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-content {
      background: #18211d;
      border: 1px solid #2a372f;
      border-radius: 16px;
      width: calc(100vw - 64px);
      max-width: none;
      height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a372f;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      cursor: pointer;
      font-size: 24px;
      color: var(--muted);
      border: 0;
      background: transparent;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-body {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .api-table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid #26362d;
      border-radius: 6px;
      background: #0f1512;
      margin-bottom: 10px;
    }

    .api-result-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      color: var(--text);
      font-size: 12px;
    }

    .api-result-table th,
    .api-result-table td {
      border-bottom: 1px solid #223129;
      border-right: 1px solid #223129;
      padding: 7px 9px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    .api-result-table th {
      background: #18211d;
      color: var(--green);
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .api-result-table tbody th {
      color: var(--gold);
      position: static;
      width: 1%;
    }

    .api-result-table td {
      color: var(--text);
    }

    .api-result-table details {
      min-width: 220px;
    }

    .api-result-table summary {
      color: var(--green);
      cursor: pointer;
      font-weight: 700;
    }

    .api-result-table .api-empty,
    .api-result-table .api-null {
      color: var(--muted);
      font-style: italic;
    }

    .api-result-table .api-scalar {
      color: var(--text);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #090e0c;
    }

    ::-webkit-scrollbar-thumb {
      background: #25332b;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--green);
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <aside>
    <div class="logo-container">
      <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/253710/logo.png"
        alt="theHunter Classic"
        style="width: 140px; height: auto; margin-bottom: 8px; filter: drop-shadow(0 0 4px rgba(127, 176, 105, 0.4));">
      <div class="logo-title" style="font-size: 11px;">THC - API Explorer</div>
      <div class="logo-subtitle">Explorador de API v1</div>
    </div>

    <ul class="nav-links">
      <li class="nav-item active"><svg viewBox="0 0 24 24" width="16" height="16"
          stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"
          style="margin-right: 8px; vertical-align: middle;">
          <polyline points="4 17 10 11 4 5"></polyline>
          <line x1="12" y1="19" x2="20" y2="19"></line>
        </svg> Explorador API</li>
    </ul>

    <div class="sidebar-footer">
      <div>Tema: Oscuro</div>
    </div>
  </aside>

  <!-- App Wrapper -->
  <main class="app-container">

    <div class="card" style="padding: 20px;">
      <h2 style="font-size: 18px; margin-bottom: 16px; color: var(--gold); text-transform: uppercase;">🛠️ THC API Explorer (Modo Desarrollador)</h2>
      <!-- Original Explorer Layout -->
      <div style="display: grid; grid-template-columns: 300px 1fr; gap: 16px;">
        <div style="background: #121a16; border: 1px solid #2a372f; padding: 14px; border-radius: 8px;">
          <label for="function-select"
            style="display:block; margin-bottom: 6px; font-size: 12px; font-weight: bold;">Función</label>
          <select id="function-select"
            style="width:100%; padding: 8px; background: #25332b; color: white; border: 1px solid #334a3e; border-radius: 4px;"></select>
          <form id="params-form" style="margin-top: 12px;"></form>
          <label class="check-row"
            style="display: flex; gap: 8px; align-items: center; margin-top: 12px; font-size: 12px; cursor: pointer;">
            <input id="enrich-ids" type="checkbox" checked style="width: auto;">
            Resolver IDs conocidos
          </label>
          <button id="run-button" type="button"
            style="margin-top: 14px; width: 100%; padding: 10px; background: var(--green); border: 0; color: #07100b; font-weight: bold; border-radius: 4px; cursor: pointer;">Ejecutar
            consulta</button>
          <div id="status" class="status muted" style="margin-top: 10px; font-size: 11px; color: var(--muted);">
            Cargando...</div>
          <div id="request-info" class="request-info muted"
            style="margin-top: 10px; font-size: 11px; color: var(--muted); border-top: 1px solid #233129; padding-top: 8px;">
          </div>
        </div>
        <div
          style="background: #121a16; border: 1px solid #2a372f; padding: 14px; border-radius: 8px; display: flex; flex-direction: column;">
          <div class="result-header"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h3 style="font-size: 16px; color: var(--text);">Resultado</h3>
            <button id="export-csv" class="export-button" type="button" hidden
              style="padding: 6px 12px; background: var(--gold); border: 0; color: #121a16; font-weight: bold; border-radius: 4px; cursor: pointer;">Exportar
              CSV</button>
            <span id="summary" class="muted" style="font-size: 12px; color: var(--muted)"></span>
          </div>
          <div id="result" class="muted"
            style="font-size: 12px; color: var(--muted); overflow: auto; flex-grow: 1; min-height: 400px; background: #0b0f0d; border-radius: 6px; padding: 12px;">
            Selecciona una función y ejecuta la consulta.</div>
        </div>
      </div>
    </div>

  </main>

  <script>
    // Show/hide API Explorer modal
  </script>

  <!-- Original API Explorer JavaScript code integrated inside Modal -->
  <script>
    const select = document.getElementById("function-select");
    const form = document.getElementById("params-form");
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const summary = document.getElementById("summary");
    const button = document.getElementById("run-button");
    const enrichIds = document.getElementById("enrich-ids");
    const requestInfo = document.getElementById("request-info");
    const exportCsv = document.getElementById("export-csv");
    const OAUTH_TOKEN_STORAGE_KEY = "thc_oauth_access_token";
    let functions = [];
    let lastResult = null;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function isObject(value) {
      return value !== null && typeof value === "object";
    }

    function scalar(value) {
      if (value === null || value === undefined) return "<span class='api-null'>null</span>";
      if (value === "") return "<span class='api-empty'>(vacio)</span>";
      if (isImageUrl(value)) return imageScalar(value);
      return `<span class="api-scalar">${escapeHtml(value)}</span>`;
    }

    function isImageUrl(value) {
      if (typeof value !== "string") return false;
      return /^https?:\/\/.+\.(png|jpe?g|webp|gif)(\?.*)?$/i.test(value);
    }

    function imageScalar(value) {
      const safeValue = escapeHtml(value);
      return `
        <a href="${safeValue}" target="_blank" rel="noopener" style="display:inline-flex; align-items:center; gap:8px; color:var(--green);">
          <img src="${safeValue}" alt="" loading="lazy" style="width:36px; height:36px; object-fit:contain; border-radius:4px; background:#0b1210; border:1px solid #26382f;">
          <span>${safeValue}</span>
        </a>
      `;
    }

    function nested(value, title) {
      return `<details><summary>${escapeHtml(title)}</summary>${render(value)}</details>`;
    }

    function table(head, rows) {
      return `<div class="api-table-wrap"><table class="api-result-table"><thead>${head}</thead><tbody>${rows}</tbody></table></div>`;
    }

    function renderObject(value) {
      const entries = Object.entries(value);
      if (!entries.length) return table("<tr><th>Campo</th><th>Valor</th></tr>", "<tr><th>0</th><td><span class='api-empty'>Objeto vacio</span></td></tr>");
      const rows = entries.map(([key, item]) => {
        const cell = isObject(item) ? nested(item, "abrir") : scalar(item);
        return `<tr><th>${escapeHtml(key)}</th><td>${cell}</td></tr>`;
      }).join("");
      return table("<tr><th>Campo</th><th>Valor</th></tr>", rows);
    }

    function renderArray(value) {
      if (!value.length) return table("<tr><th>#</th><th>Valor</th></tr>", "<tr><th>0</th><td><span class='api-empty'>Lista vacia</span></td></tr>");
      const objectRows = value.every(item => item && typeof item === "object" && !Array.isArray(item));
      if (!objectRows) {
        const rows = value.map((item, index) => `<tr><th>${index}</th><td>${isObject(item) ? nested(item, "abrir") : scalar(item)}</td></tr>`).join("");
        return table("<tr><th>#</th><th>Valor</th></tr>", rows);
      }

      const keys = [...new Set(value.flatMap(item => Object.keys(item)))];
      const head = keys.map(key => `<th>${escapeHtml(key)}</th>`).join("");
      const rows = value.map((item, index) => {
        const cells = keys.map(key => {
          const cell = item[key];
          return `<td>${isObject(cell) ? nested(cell, key) : scalar(cell)}</td>`;
        }).join("");
        return `<tr><th>${index}</th>${cells}</tr>`;
      }).join("");
      return table(`<tr><th>#</th>${head}</tr>`, rows);
    }

    function render(value) {
      if (Array.isArray(value)) return renderArray(value);
      if (isObject(value)) return renderObject(value);
      return table("<tr><th>Campo</th><th>Valor</th></tr>", `<tr><th>Valor</th><td>${scalar(value)}</td></tr>`);
    }

    function flattenCsv(value, prefix = "", output = {}) {
      if (!isObject(value)) {
        output[prefix || "value"] = value;
        return output;
      }
      for (const [key, item] of Object.entries(value)) {
        const path = prefix ? `${prefix}.${key}` : key;
        if (Array.isArray(item)) output[path] = JSON.stringify(item);
        else if (isObject(item)) flattenCsv(item, path, output);
        else output[path] = item;
      }
      return output;
    }

    function csvCell(value) {
      const text = value === null || value === undefined ? "" : String(value);
      return `"${text.replaceAll('"', '""')}"`;
    }

    function downloadCsv() {
      const source = Array.isArray(lastResult) ? lastResult : [lastResult];
      const rows = source.map(item => flattenCsv(item));
      const headers = [...new Set(rows.flatMap(row => Object.keys(row)))];
      const csv = [
        headers.map(csvCell).join(","),
        ...rows.map(row => headers.map(header => csvCell(row[header])).join(","))
      ].join("\r\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${select.value || "consulta"}.csv`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function selectedFunction() {
      return functions.find(item => item.name === select.value);
    }

    function browserOauthToken() {
      return localStorage.getItem(OAUTH_TOKEN_STORAGE_KEY) || sessionStorage.getItem(OAUTH_TOKEN_STORAGE_KEY) || "";
    }

    function rememberBrowserOauthToken(params) {
      const token = params.oauth_access_token;
      if (token) localStorage.setItem(OAUTH_TOKEN_STORAGE_KEY, token);
    }

    function renderParams() {
      const item = selectedFunction();
      form.innerHTML = (item?.params || []).map(param => {
        const value = param.name === "oauth_access_token" ? browserOauthToken() : param.default;
        const tokenHint = param.name === "oauth_access_token" && value
          ? "<div style=\"margin-top:4px; font-size:10px; color:var(--green);\">Token cargado desde navegador</div>"
          : "";
        return `
        <label for="param-${escapeHtml(param.name)}" style="display:block; margin-top: 10px; font-size:11px; color:var(--muted);">${escapeHtml(param.label)}</label>
        <input id="param-${escapeHtml(param.name)}"
               name="${escapeHtml(param.name)}"
               type="${escapeHtml(param.type)}"
               value="${escapeHtml(value)}"
               ${param.required ? "required" : ""}
               style="width: 100%; padding:6px; background:#18211d; color:white; border: 1px solid #334a3e; border-radius: 4px; font-size:12px;">
        ${tokenHint}
      `;
      }).join("");
    }

    function renderRequests(requests) {
      if (!requests.length) {
        requestInfo.innerHTML = "<strong>Peticiones remotas:</strong> ninguna.";
        return;
      }
      requestInfo.innerHTML = `<strong>Peticiones remotas consumidas:</strong>${requests.map((request, index) => `
        <details style="margin-top: 4px;">
          <summary style="cursor:pointer; color:var(--green); font-size:10px;">${escapeHtml(request.method)} ${escapeHtml(request.url)}</summary>
          <code style="display:block; background:#0b0f0d; padding:4px; font-size:9px; margin-top:2px;">${escapeHtml(request.copy_url)}</code>
        </details>
      `).join("")}`;
    }

    async function loadFunctions() {
      const response = await fetch("/api/functions");
      functions = await response.json();
      const groups = [...new Set(functions.map(item => item.group))];
      select.innerHTML = groups.map(group => {
        const options = functions.filter(item => item.group === group)
          .map(item => `<option value="${escapeHtml(item.name)}">${escapeHtml(item.label)}</option>`)
          .join("");
        return `<optgroup label="${escapeHtml(group)}" style="background:#18211d; color:white;">${options}</optgroup>`;
      }).join("");
      renderParams();
      status.textContent = `${functions.length} funciones disponibles`;
    }

    async function run() {
      const item = selectedFunction();
      const data = new FormData(form);
      const params = Object.fromEntries(data.entries());
      rememberBrowserOauthToken(params);
      button.disabled = true;
      status.textContent = "Consultando...";
      status.className = "status muted";
      summary.textContent = "";
      lastResult = null;
      exportCsv.hidden = true;
      requestInfo.textContent = "";
      result.innerHTML = "<p class='muted'>Esperando respuesta...</p>";

      try {
        const response = await fetch("/api/call", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: item.name, params, enrich_ids: enrichIds.checked })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Error desconocido");
        const responseData = payload.data === undefined ? payload : payload.data;
        result.innerHTML = render(responseData);
        lastResult = responseData;
        exportCsv.hidden = false;
        renderRequests(payload.requests || []);
        summary.textContent = `${item.label} - ${payload.elapsed_ms} ms`;
        status.textContent = "Consulta completada";
      } catch (error) {
        result.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`;
        status.textContent = "La consulta no pudo completarse";
        status.className = "status error";
      } finally {
        button.disabled = false;
      }
    }

    select.addEventListener("change", renderParams);
    button.addEventListener("click", run);
    exportCsv.addEventListener("click", downloadCsv);
    loadFunctions().catch(error => {
      status.textContent = `Error: ${error.message}`;
    });
  </script>
</body>

</html>
