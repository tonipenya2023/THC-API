<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>THC - Hunter Overview Grafana v2</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07100b;
      --panel: #101b14;
      --line: #1f3326;
      --text: #e8efe7;
      --muted: #9eb2a6;
      --gold: #d6a84f;
      --green: #7fb069;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    .topbar {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: #0a140e;
    }
    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .brand span {
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    a {
      color: var(--green);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    a:hover { color: var(--gold); }
    iframe {
      width: 100%;
      height: calc(100vh - 52px);
      border: 0;
      display: block;
      background: var(--panel);
    }
    .empty {
      min-height: calc(100vh - 52px);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .empty-inner {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 22px;
      border-radius: 8px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 0;
    }
    p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.45;
    }
    code {
      color: var(--text);
      background: #07100b;
      border: 1px solid var(--line);
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span>THC - Hunter Overview Grafana v2</span>
    </div>
    <nav class="links">
      <a href="/grafana-dashboard.json">JSON Grafana</a>
      <a href="/api-explorer">API Explorer</a>
    </nav>
  </header>

  <main id="app"></main>

  <script>
    const dashboardUrl = "__GRAFANA_DASHBOARD_URL__";
    const grafanaUrl = "__GRAFANA_URL__";
    const dashboardUid = "76b66a2d-ef24-4135-8b5c-9d6e9c9ad39e";
    const app = document.getElementById("app");

    // Use dashboardUrl if configured, otherwise fallback to the default dashboard v2 URL
    const targetUrl = (dashboardUrl && dashboardUrl !== "__GRAFANA_DASHBOARD_URL__" && dashboardUrl.trim() !== "")
      ? dashboardUrl
      : `${grafanaUrl}/d/${dashboardUid}?orgId=1&kiosk`;

    const frame = document.createElement("iframe");
    frame.src = targetUrl;
    frame.title = "THC - Hunter Overview Grafana v2";
    app.appendChild(frame);
  </script>
</body>
</html>
